services:
  - type: web
    name: telegram-digital-store-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: BASE_URL
        sync: false
      - key: NODE_ENV
        value: production
